            background-color: #4c56af;

                inset 2px 2px 4px rgba(255, 255, 255, 0.5),
                inset 2px 2px 6px rgba(255, 255, 255, 0.2),

        @keyframes colorChange {
            0% { color: #4c56af; }
            25% { color: #8e44ad; }

<body>
    <div class="container">
        <h1>KEY FREE BY HÙNG</h1>

        <div class="form">
            <div>
                <h3>CLICK VÀO Ô BÊN DƯỚI ĐỂ TỰ ĐỘNG SAO CHÉP KEY</h3>
                <div><br /></div>
                <p>
                    <button class="button" name="submit" onclick="copyToClipboard('#keytool')" type="submit">
                        <span id="keytool">BẠN CHƯA LẤY KEY</span>
                    </button>
                </p>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>

    <script>
        var key = GetURLParameter('key');
        if (key != "") {
            document.getElementById("keytool").innerHTML = key;
        }

        function GetURLParameter(sParam) {
            var sPageURL = window.location.search.substring(1);
            var sURLVariables = sPageURL.split('&');
            for (var i = 0; i < sURLVariables.length; i++) {
                var sParameterName = sURLVariables[i].split('=');
                if (sParameterName[0] == sParam) {
                    return sParameterName[1];
                }
            }
        }
        function copyToClipboard(element) {
            var $temp = $("<input>");
            $("body").append($temp);
            $temp.val($(element).text()).select();
            document.execCommand("copy");
            $temp.remove();

            return confirm('Bạn đã copy key');
        }
    </script>
